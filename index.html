<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Orientation Bac Maroc</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body{font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:#f3f4f9;margin:0; transition: all 0.3s ease; color: #1f2937;}
    .container{max-width:850px;margin:auto;padding:20px}
    .card{background:white;padding:35px;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
    .lang-switcher{display:flex; justify-content: center; gap: 10px; margin-bottom: 25px;}
    .lang-btn{padding: 8px 16px; cursor: pointer; border: 2px solid #e5e7eb; border-radius: 8px; background: #fff; font-weight: bold; transition: 0.2s;}
    .lang-btn.active{background: #2563eb; color: white; border-color: #2563eb;}
    h1{margin-top:0; font-size: 1.8rem; text-align: center;}
    .progress{height:8px;background:#e5e7eb;border-radius:10px;margin: 25px 0; overflow: hidden;}
    .bar{height:100%;background:linear-gradient(90deg, #2563eb, #3b82f6);width:0; transition: width 0.4s ease;}
    .option{border: 2px solid #f3f4f6; border-radius:12px; padding:15px; margin:10px 0; cursor:pointer; transition: 0.2s; font-size: 1.05rem;}
    .option:hover{background:#f9fafb; border-color: #d1d5db;}
    .selected{background:#eff6ff; border-color: #2563eb; font-weight: 500;}
    button#nextBtn{width: 100%; background:#2563eb; color:white; border:none; padding:15px; border-radius:12px; margin-top:20px; cursor:pointer; font-size: 1.1rem; font-weight: bold;}
    button#nextBtn:hover{background:#1d4ed8;}
    .resultBox{background:#f8fafc; padding:20px; border-radius:12px; margin-top:15px; border-left: 6px solid #2563eb;}
    [dir="rtl"] .resultBox{border-left: none; border-right: 6px solid #2563eb;}
    canvas{margin-top:30px; max-height: 400px;}
</style>
</head>
<body>
<div class="container" id="mainContainer">
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLanguage('en')">English</button>
        <button class="lang-btn" onclick="setLanguage('fr')">Français</button>
        <button class="lang-btn" onclick="setLanguage('ar')">العربية</button>
    </div>
    <div class="card">
        <h1 id="txt-title">Moroccan Bac Orientation Test</h1>
        <p id="txt-desc" style="text-align: center; color: #6b7280;"></p>
        <div class="progress"><div class="bar" id="bar"></div></div>
        <div id="question"></div>
        <div id="options"></div>
        <button id="nextBtn">Next</button>
        <div id="result"></div>
        <canvas id="chart"></canvas>
    </div>
</div>

<script>

    },

        ar: { name: "التربية، المجال الاجتماعي والإعلام", schools: ["المدرسة العليا للأساتذة", "معهد الصحافة", "كليات الآداب", "علوم التربية"] }
    }

const questions = [
    {
        en: "What kind of workshop would you prefer to attend?",

        ar: "ما هو نوع الورشات التي تفضل حضورها؟",
        o: {
            en: ["Mechanical repair or DIY", "Scientific data analysis", "Public speaking and sales", "Conflict resolution and psychology"],
            fr: ["Réparation mécanique ou bricolage", "Analyse de données scientifiques", "Prise de parole et vente", "Médiation et psychologie"],
            ar: ["الإصلاح الميكانيكي أو اليدوي", "تحليل البيانات العلمية", "الخطابة والبيع", "حل النزاعات وعلم النفس"]
        }
    },
    {
        en: "Which school subject do you master the most?",
        fr: "Quelle matière scolaire maîtrisez-vous le mieux ?",
        ar: "ما هي المادة الدراسية التي تتقنها أكثر؟",
        o: {
            en: ["Technology / Engineering science", "Mathematics or Physics", "Economics or Accounting", "Languages or Philosophy"],
            fr: ["Technologie / Sciences de l'ingénieur", "Mathématiques ou Physique", "Économie ou Comptabilité", "Langues ou Philosophie"],
            ar: ["التكنولوجيا / علوم المهندس", "الرياضيات أو الفيزياء", "الاقتصاد أو المحاسبة", "اللغات أو الفلسفة"]
        }
    },
    {
        en: "What do you like to do in your free time?",
        fr: "Que préférez-vous faire pendant votre temps libre ?",
        ar: "ماذا تحب أن تفعل في وقت فراغك؟",
        o: {
            en: ["Fixing electronic devices", "Reading about new discoveries", "Planning a small project or business", "Volunteering for a local NGO"],
            fr: ["Réparer des appareils électroniques", "Lire sur les découvertes", "Planifier un projet ou commerce", "Bénévolat dans une association"],
            ar: ["إصلاح الأجهزة الإلكترونية", "القراءة عن الاكتشافات الجديدة", "التخطيط لمشروع أو تجارة صغيرة", "التطوع في جمعية خيرية"]
        }
    },
    {
        en: "If you were to write a book, what would it be about?",
        fr: "Si vous deviez écrire un livre, sur quoi porterait-il ?",
        ar: "إذا كان عليك تأليف كتاب، فماذا سيكون موضوعه؟",
        o: {
            en: ["A technical user guide", "A scientific theory", "Success and leadership secrets", "A social or human drama"],
            fr: ["Un guide technique", "Une théorie scientifique", "Secrets de succès et leadership", "Un drame social ou humain"],
            ar: ["دليل تقني للاستخدام", "نظرية علمية", "أسرار النجاح والقيادة", "قصة اجتماعية أو إنسانية"]
        }
    },
    {
        en: "In a professional team, you are the one who:",
        fr: "Dans une équipe, vous êtes celui/celle qui :",
        ar: "في فريق عمل، أنت الشخص الذي:",
        o: {

            fr: ["Construit le produit/système", "Analyse les problèmes", "Dirige le groupe", "Soutient et motive les membres"],

            en: ["A construction site or factory", "A high-tech laboratory", "A modern corporate building", "A classroom or counseling center"],

            ar: ["ورشة بناء أو مصنع", "مختبر تقني عالي المستوى", "مكتب شركة عصري", "فصل دراسي أو مركز استشارة"]
        }
    },
    {
        en: "Which of these personalities inspires you the most?",
        fr: "Laquelle de ces personnalités vous inspire le plus ?",
        ar: "أي من هذه الشخصيات تلهمك أكثر؟",
        o: {
            en: ["Elon Musk (Innovation/Engineering)", "Marie Curie (Research/Science)", "Steve Jobs (Marketing/Business)", "Nelson Mandela (Social Change)"],
            fr: ["Elon Musk (Innovation/Ingénierie)", "Marie Curie (Recherche/Science)", "Steve Jobs (Marketing/Business)", "Nelson Mandela (Changement Social)"],
            ar: ["إيلون ماسك (ابتكار/هندسة)", "ماري كوري (بحث/علوم)", "ستيف جوبز (تسويق/أعمال)", "نيلسون مانديلا (تغيير اجتماعي)"]
        }
    },
    {
        en: "How do you handle a complex problem?",
        fr: "Comment gérez-vous un problème complexe ?",
        ar: "كيف تتعامل مع مشكلة معقدة؟",
        o: {
            en: ["By testing practical solutions", "By searching for logic and data", "By delegating and negotiating", "By discussing and helping others"],
            fr: ["En testant des solutions pratiques", "En cherchant la logique et les données", "En déléguant et négociant", "En discutant et en aidant les autres"],
            ar: ["بتجربة حلول عملية", "بالبحث عن المنطق والبيانات", "بالتفويض والتفاوض", "بالنقاش ومساعدة الآخرين"]
        }
    },
    {
        en: "What is your main goal in a career?",
        fr: "Quel est votre objectif principal dans une carrière ?",
        ar: "ما هو هدفك الأساسي في مسارك المهني؟",
        o: {
            en: ["To create concrete objects", "To understand how the world works", "To achieve financial success", "To make a difference in people's lives"],
            fr: ["Créer des objets concrets", "Comprendre comment le monde fonctionne", "Réussir financièrement", "Faire une différence dans la vie des gens"],
            ar: ["صناعة أشياء ملموسة", "فهم كيف يعمل العالم", "تحقيق النجاح المالي", "إحداث فرق في حياة الناس"]
        }
    },
    {
        en: "In school, you prefer projects that involve:",
        fr: "À l'école, vous préférez les projets qui impliquent :",
        ar: "في المدرسة، تفضل المشاريع التي تتضمن:",
        o: {
            en: ["Building or assembling things", "Doing deep research", "Pitching an idea to a jury", "Working with children or the public"],
            fr: ["Construire ou assembler des choses", "Faire des recherches approfondies", "Présenter une idée à un jury", "Travailler avec des enfants ou le public"],
            ar: ["بناء أو تجميع الأشياء", "إجراء بحث معمق", "عرض فكرة أمام لجنة", "العمل مع الأطفال أو الجمهور"]
        }
    },
    {
        en: "What motivates you to work hard?",
        fr: "Qu'est-ce qui vous motive à travailler dur ?",
        ar: "ما الذي يحفزك على العمل بجد؟",
        o: {
            en: ["Seeing the physical result", "Solving a difficult puzzle", "Winning a competition", "Feeling useful to others"],
            fr: ["Voir le résultat physique", "Résoudre une énigme difficile", "Gagner une compétition", "Se sentir utile aux autres"],
            ar: ["رؤية نتيجة ملموسة", "حل لغز صعب", "الفوز في مسابقة", "الشعور بأنك مفيد للآخرين"]
        }
    },
    {
        en: "Which application would you like to develop?",
        fr: "Quelle application aimeriez-vous développer ?",
        ar: "ما هو التطبيق الذي تود تطويره؟",
        o: {
            en: ["A tool for home automation", "A diagnostic tool for diseases", "An e-commerce platform", "A platform for mental health support"],
            fr: ["Un outil de domotique", "Un outil de diagnostic médical", "Une plateforme de e-commerce", "Une plateforme de soutien psychologique"],
            ar: ["أداة للتحكم في المنزل", "أداة لتشخيص الأمراض", "منصة للتجارة الإلكترونية", "منصة للدعم النفسي"]
        }
    },
    {
        en: "You are invited to a conference, which topic do you choose?",
        fr: "Vous êtes invité(e) à une conférence, quel sujet choisissez-vous ?",
        ar: "تمت دعوتك لمحاضرة، أي موضوع تختار؟",
        o: {
            en: ["New battery technologies", "Genetic engineering", "Real estate investment", "Human rights and education"],
            fr: ["Nouvelles technologies de batterie", "Génie génétique", "Investissement immobilier", "Droits de l'homme et éducation"],
            ar: ["تقنيات البطاريات الجديدة", "الهندسة الوراثية", "الاستثمار العقاري", "حقوق الإنسان والتعليم"]
        }
    },
    {
        en: "Which soft skill is your strongest?",
        fr: "Quelle est votre plus grande compétence transversale ?",
        ar: "ما هي أقوى مهارة شخصية لديك؟",
        o: {
            en: ["Precision and accuracy", "Critical thinking", "Persuasion", "Empathy"],
            fr: ["Précision et exactitude", "Pensée critique", "Persuasion", "Empathie"],
            ar: ["الدقة والإتقان", "التفكير النقدي", "الإقناع", "التعاطف"]
        }
    },
    {
        en: "Which Moroccan company interests you most?",
        fr: "Quelle entreprise marocaine vous intéresse le plus ?",
        ar: "أي شركة مغربية تثير اهتمامك أكثر؟",
        o: {
            en: ["OCP (Industrial/Technical)", "MASEN (Renewable Energy/Research)", "BCP or Attijari (Banking/Business)", "Foundation Zakoura (Social/Education)"],
            fr: ["OCP (Industrie/Technique)", "MASEN (Énergie/Recherche)", "BCP ou Attijari (Banque/Affaires)", "Fondation Zakoura (Social/Éducation)"],
            ar: ["OCP (صناعة/تقنية)", "MASEN (طاقة متجددة/بحث)", "التجاري وفا بنك (بنك/أعمال)", "مؤسسة زاكورة (اجتماعي/تعليم)"]
        }

];

function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.getElementById("mainContainer").dir = (lang === 'ar') ? 'rtl' : 'ltr';
    
    document.getElementById("txt-title").innerText = translations[lang].title;
    document.getElementById("txt-desc").innerHTML = translations[lang].desc;
    document.getElementById("nextBtn").innerText = translations[lang].next;
    
    document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.remove('active');
        if(b.innerText.toLowerCase().includes(lang === 'ar' ? 'عرب' : lang === 'fr' ? 'fran' : 'eng')) b.classList.add('active');
    });
    
    if(index < questions.length) showQuestion();
    else calculate();
}

function showQuestion(){
    const q = questions[index];
    document.getElementById("question").innerHTML=`<h3>${index+1}. ${q[currentLang]}</h3>`;
    const optDiv=document.getElementById("options");
    optDiv.innerHTML="";
    q.o[currentLang].forEach((opt,i)=>{
        const d=document.createElement("div");
        d.className="option" + (answers[index] === i ? " selected" : "");
        d.innerText=opt;
        d.onclick=()=>select(i,d);
        optDiv.appendChild(d);
    });
    updateBar();
}

function select(i,el){
    answers[index]=i;
    document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
    el.classList.add("selected");
}

function updateBar(){
    const percent=(index/questions.length)*100;
    document.getElementById("bar").style.width=percent+"%";
}

document.getElementById("nextBtn").onclick = () => {
    if(answers[index] == null){
        alert(translations[currentLang].alert);
        return;
    }
    index++;
    if(index < questions.length) showQuestion();
    else calculate();
};

function calculate(){
    scores.R=0; scores.I=0; scores.E=0; scores.S=0;
    answers.forEach(a=>{
        if(a===0)scores.R++; if(a===1)scores.I++; if(a===2)scores.E++; if(a===3)scores.S++;
    });

    const langData = translations[currentLang];
    let ranked=Object.entries(scores).sort((a,b)=>b[1]-a[1]);

    let html=`<h2>${langData.resTitle}</h2>`;
    for(let i=0;i<2;i++){
        let key=ranked[i][0];
        let d = domains[key][currentLang];
        html+=`<div class='resultBox'><b>${i+1}. ${d.name}</b><br>
        <small>${langData.example}</small> ${d.schools.join(", ")}</div>`;
    }

    document.getElementById("question").innerHTML="";
    document.getElementById("options").innerHTML="";
    document.getElementById("nextBtn").style.display="none";
    document.getElementById("result").innerHTML=html;
    document.getElementById("bar").style.width="100%";

    createChart();
}

function createChart(){
    const ctx=document.getElementById('chart');
    if(myChart) myChart.destroy();
    myChart = new Chart(ctx,{
        type:'radar',
        data:{
            labels: translations[currentLang].chartLabels,
            datasets:[{
                label: (currentLang === 'ar' ? "نتائجك" : "Your Results"), 
                data:[scores.R, scores.I, scores.E, scores.S], 
                fill:true, 
                backgroundColor: 'rgba(37, 99, 235, 0.2)', 
                borderColor: '#2563eb',
                pointBackgroundColor: '#2563eb'
            }]
        },
        options:{ scales:{ r:{ beginAtZero:true, max: 15 } } }
    });
}

setLanguage('fr'); // Initialisation
</script>
</body>
</html>
